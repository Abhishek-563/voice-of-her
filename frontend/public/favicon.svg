<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
    
    <!-- Neon Shield Edge Gradient -->
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Fill Gradient -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Shield Base Shape -->
  <g filter="url(#glow)">
    <!-- Outer Shield Border -->
    <path d="M256,60 C340,60 410,90 410,170 C410,290 320,380 256,450 C192,380 102,290 102,170 C102,90 172,60 256,60 Z" 
          stroke="url(#shieldBorder)" stroke-width="16" stroke-linejoin="round" fill="url(#shieldFill)" />
          
    <!-- Inner Shield Accented dashed line -->
    <path d="M256,90 C316,90 370,112 370,170 C370,260 294,340 256,405 C218,340 142,260 142,170 C142,112 196,90 256,90 Z" 
          stroke="url(#shieldBorder)" stroke-width="3" stroke-dasharray="10 8" stroke-opacity="0.4" />
  </g>

  <!-- Center Icon: Voice-activated Safety Waves & Protection Emblem -->
  <g filter="url(#glow)">
    <!-- Concentric Voice/Radar Waves -->
    <!-- Wave 1 (outer) -->
    <path d="M180,180 A100,100 0 0,1 332,180" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <!-- Wave 2 (middle) -->
    <path d="M205,205 A72,72 0 0,1 307,205" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.9" />
    <!-- Wave 3 (inner) -->
    <path d="M230,230 A45,45 0 0,1 282,230" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" />

    <!-- Center Protection Key / Safe Shield Checkmark -->
    <path d="M225,290 L248,313 L295,265" stroke="#10b981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Safety Anchor Core (Vertical trust pillar) -->
    <path d="M256,310 L256,365" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" />
    <circle cx="256" cy="370" r="14" fill="#3b82f6" />
  </g>
</svg>